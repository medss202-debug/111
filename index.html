<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر المنتجات</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <header class="store-header">
        <h1>متجرنا الحديث</h1>
        <p class="select-message">حدد الالوان التي تعجبك</p>
    </header>

    <main class="store-container">
        <div class="products-grid" id="products-grid">
            <p style="text-align:center; padding:20px; grid-column: span 2;">جاري تحميل المنتجات...</p>
        </div>
        <div class="booking-section">
            <button id="btn-book-now" class="btn-book-now">حجز الان</button>
        </div>
    </main>

    <!-- نافذة تأكيد الطلب -->
    <div id="modal-checkout" class="modal-overlay">
        <div class="modal-card">
            <h3>تأكيد الطلب</h3>
            <div class="selected-product-summary">
                 <img id="checkout-img" src="" alt="">
                 <p id="checkout-desc"></p>
            </div>
            <div class="form-group">
                <label>الاسم الكامل:</label>
                <input type="text" id="order-name" placeholder="مثال: أحمد محمد" required>
            </div>
            <div class="form-group">
                <label>رقم الهاتف (11 رقم إجباري):</label>
                <input type="tel" id="order-phone" placeholder="07xxxxxxxxx" required dir="ltr">
            </div>
            <div class="form-group">
                <label>المحافظة:</label>
                <select id="order-gov" required>
                    <option value="" disabled selected>اختر المحافظة...</option>
                    <option value="بغداد">بغداد</option>
                    <option value="البصرة">البصرة</option>
                    <option value="نينوى">نينوى</option>
                    <option value="أربيل">أربيل</option>
                    <option value="السليمانية">السليمانية</option>
                    <option value="كركوك">كركوك</option>
                    <option value="صلاح الدين">صلاح الدين</option>
                    <option value="الأنبار">الأنبار</option>
                    <option value="ديالى">ديالى</option>
                    <option value="واسط">واسط</option>
                    <option value="بابل">بابل</option>
                    <option value="كربلاء">كربلاء</option>
                    <option value="النجف">النجف</option>
                    <option value="الديوانية">الديوانية</option>
                    <option value="المثنى">المثنى</option>
                    <option value="ذي قار">ذي قار</option>
                    <option value="ميسان">ميسان</option>
                    <option value="دهوك">دهوك</option>
                    <option value="حلبجة">حلبجة</option>
                </select>
            </div>
            <div class="form-group">
                <label>أقرب نقطة دالة:</label>
                <input type="text" id="order-address" placeholder="اسم الشارع، تقاطع أو معلم رئيسي..." required>
            </div>
            <p id="checkout-error" style="color: red; text-align: center; display: none; margin-bottom: 10px;"></p>
            <div class="modal-actions">
                <button id="btn-submit-order" class="btn-primary">إرسال الطلب</button>
                <button id="btn-cancel-order" class="btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة النجاح -->
    <div id="modal-success" class="modal-overlay">
        <div class="modal-card text-center">
            <div class="success-icon">🎉</div>
            <h3 style="margin-bottom: 10px;">تم تسجيل طلبك بنجاح!</h3>
            <p style="margin-bottom: 25px; color:#555;">يمكنك زيارة المتجر الخاص بنا لمزيد من العروض.</p>
            <div class="modal-actions" style="justify-content: center; width: 100%;">
                <button id="btn-visit-store" class="btn-primary" style="flex:1;">زيارة المتجر</button>
                <button id="btn-skip" class="btn-secondary" style="flex:1;">تخطي</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=2.0"></script>
</body>
</html>
